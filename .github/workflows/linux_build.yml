name: Linux Build (nt-connect)

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

env:
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  CARGO_EXPAND_VERSION: "1.0.95"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build:
    name: Build nt-connect (linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize disk space
        run: |
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential clang cmake curl gcc git g++ \
            libayatana-appindicator3-dev libasound2-dev libclang-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev libpam0g-dev libpulse-dev libva-dev libssl-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxdo-dev libxfixes-dev \
            llvm-dev nasm ninja-build pkg-config python3 wget xz-utils unzip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ubuntu-22.04

      - name: Install Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch Flutter SDK (3.24.5 dropdown_menu)
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff "$(dirname "$(dirname "$(which flutter)")")"
          cd "$(dirname "$(dirname "$(which flutter)")")"
          git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: vcpkg install (x64-linux)
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-linux
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            --triplet x64-linux \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: Generate flutter_rust_bridge bindings
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features uuid --locked
          # Codegen needs older extended_text; restore afterwards.
          pushd flutter
          sed -i -e 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml
          flutter pub get
          popd
          flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h
          # ffigen workaround (matches build.py:ffi_bindgen_function_refactor)
          sed -i "s/ffi.NativeFunction<ffi.Bool Function(DartPort/ffi.NativeFunction<ffi.Uint8 Function(DartPort/g" \
            flutter/lib/generated_bridge.dart
          # Restore pubspec to the version Flutter 3.24.5 expects.
          git checkout -- flutter/pubspec.yaml
          rm -f flutter/pubspec.lock
          pushd flutter && flutter pub get && popd

      - name: Build nt-connect (Rust lib + Flutter)
        env:
          VCPKG_ROOT: /opt/vcpkg
          CARGO_INCREMENTAL: "0"
        run: |
          cargo build --lib --release --features hwcodec,flutter,unix-file-copy-paste
          pushd flutter && flutter build linux --release && popd

      - name: Stage artifact
        run: |
          mv flutter/build/linux/x64/release/bundle ./nt-connect

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nt-connect-linux-x86_64
          path: nt-connect
