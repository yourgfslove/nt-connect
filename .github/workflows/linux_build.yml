name: Linux Build (Flutter + Rust)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout + submodules
      # =====================
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # =====================
      # System dependencies (NO vcpkg)
      # =====================
      - name: Install Linux deps
        run: |
          sudo apt update
          sudo apt install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev libglib2.0-dev \
            libasound2-dev libpulse-dev libsecret-1-dev

      # =====================
      # Flutter
      # =====================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter config --enable-linux-desktop

      # =====================
      # Rust
      # =====================
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # =====================
      # Build Rust
      # =====================
      - name: Build Rust
        run: cargo build --release

      # =====================
      # Build Flutter Linux
      # =====================
      - name: Build Flutter Linux
        run: flutter build linux --release

      # =====================
      # Copy .so
      # =====================
      - name: Copy Rust library
        run: cp target/release/*.so build/linux/x64/release/bundle/

      # =====================
      # Upload artifact
      # =====================
      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/
